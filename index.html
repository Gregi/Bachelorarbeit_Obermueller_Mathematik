            border-radius: 2em;

            margin-left: 8px;
        }

        p {

            color: #57606a;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            text-decoration: none;
            transition: background-color 0.2s;
            cursor: pointer;

            border: 1px solid rgba(27, 31, 36, 0.15);
        }

        .btn-pdf:hover {
            background-color: #2c3238;
        }

        /* Haupt-Download Button für die Software (Grün wie der GitHub Code-Button) */
        .btn-exe {
            background-color: #1f883d;
            color: #ffffff;
            border: 1px solid rgba(27, 31, 36, 0.15);
        }

        .btn-exe:hover {
            background-color: #1a7f37;
        }

        .btn svg {
            margin-right: 8px;
            fill: currentColor;
        }
